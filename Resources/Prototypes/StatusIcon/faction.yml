- type: factionIcon
  id: ZombieFaction
  priority: 11
  showTo:
    components:
    - ShowAntagIcons
    - Zombie
    - InitialInfected
  icon:
    sprite: &job-icon-rsi /Textures/_Funkystation/Interface/Misc/job_icons.rsi # Funky - Any antag faction icons that are already ID card options go here
    state: Zombie

- type: factionIcon
  id: InitialInfectedFaction
  priority: 11
  showTo:
    components:
    - ShowAntagIcons
    - InitialInfected
    - Zombie
  icon:
    sprite: &antag-icon-rsi /Textures/_Funkystation/Interface/Misc/antag_icons.rsi # Funky - All other antag faction icons go here
    state: InitialInfected

- type: factionIcon
  id: RevolutionaryFaction
  isShaded: true
  priority: 11
  showTo:
    components:
      - ShowAntagIcons
      - Revolutionary
  icon:
    sprite: *antag-icon-rsi # Funky
    state: Revolutionary

- type: factionIcon
  id: HeadRevolutionaryFaction
  isShaded: true
  priority: 11
  showTo:
    components:
      - ShowAntagIcons
      - Revolutionary
  icon:
    sprite: *antag-icon-rsi # Funky
    state: HeadRevolutionary

- type: factionIcon
  id: BloodCultFaction
  isShaded: true
  priority: 11
  visibleToGhosts: true
  showTo:
    requireAll: true
    components:
      - ShowAntagIcons
      - BloodCultist
  icon:
    sprite: *antag-icon-rsi # Funky
    state: Cultist

- type: factionIcon
  id: SyndicateFaction
  priority: 0
  locationPreference: Left
  icon:
    sprite: *job-icon-rsi # Funky
    state: Syndicate
