    species: Ant

- type: entity
  parent:
  - AppearanceAnt
  - BaseSpeciesMobOrganic
  - SolutionAntEdible
  id: MobAnt
  name: Urist McAnt
  components:
  - type: Icon
    sprite: _MACRO/Mobs/Species/Ant/parts.rsi
    state: full
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatMeatball #meatball until someone makes ant meat
      amount: 1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.05
        # they r smaller #they r smaller (2) #they r smaller (3)
        density: 10
        restitution: 0.0
        mask:
        - SmallMobMask
        layer: #they can go under doors, in exchange for this they die in a single hit
        - SmallMobLayer
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.1
  - type: Vocal
    sounds:
      Male: UnisexAnt
      Female: UnisexAnt
      Unsexed: UnisexAnt
  - type: Damageable
    damageModifierSet: Ant
  - type: MobThresholds
    thresholds:
      0: Alive
      9: Critical
      10: Dead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:GibBehavior { }
  - type: StepTrigger
    requiredTriggeredSpeed: 1
  - type: TriggerOnStepTrigger
  - type: RandomChanceTriggerCondition
    successChance: 0.001 #only the most inattentive ant could fall for such a trick
  - type: GibOnTrigger
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _MACRO/Mobs/Effects/apid_brute_damage.rsi
        color: "#808A51"
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: InsectBlood
        Quantity: 30
  - type: Speech
    speechBubbleOffset: -0.35
    speechVerb: Arachnid
    speechSounds: Arachnid
    allowedEmotes: [ 'Chitter' ] # had to remove GoblinThroatSinging for macrocosm
  - type: TooShortForUI
    blacklist:
      components:
      - TooShortForUiBlacklist
    whitelist:
      components:
      - TooShortForUiWhitelist
  - type: MeleeWeapon
    attackRate: 1
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0.1 # they can carry heavy objects but can't throw a punch
  - type: Item
    size: Tiny
    sprite: _MACRO/Mobs/Species/Ant/ants_held.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: FlavorProfile
    flavors:
    - ants
  - type: Edible
  - type: CanEscapeInventory
    baseResistTime: 2
  - type: Tag
    tags:
    - VimPilot
    - DoorBumpOpener
    - AnomalyHost
    - CanPilot
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
          state: inhand_left
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
          state: inhand_right

- type: entity
  abstract: true
  parent: [SolutionFood]
  id: SolutionAntEdible
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Ants
        Quantity: 5 #5 of ants = 1 of ant

