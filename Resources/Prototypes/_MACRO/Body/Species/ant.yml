            state: eyes
      ears:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
            state: ears
      mask:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
            state: mask
      neck:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
            state: neck
      outerClothing:
        sizeMaps:
          32:
            sprite: _MACRO/Mobs/Species/Ant/displacement.rsi
            state: outerClothing
      gloves:
        sizeMaps:
          32:
