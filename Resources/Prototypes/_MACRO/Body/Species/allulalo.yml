  - type: HumanoidProfile
    species: Allulalo

- type: entity
  parent:
  - AppearanceAllulalo
  - BaseSpeciesMobOrganic
  id: MobAllulalo
  name: Uristia Mc-Hands
  components:
  - type: AllulaloAccent
  - type: TypingIndicator
    proto: allulalo
  - type: Vocal
    sounds:
      Male: UnisexAllulalo
      Female: UnisexAllulalo
      Unsexed: UnisexAllulalo
  - type: Damageable
    damageModifierSet: Allulalo #stops them from being oppressive hopefully
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: BloodAllulalo
        Quantity: 250 #should be 50 less than the default of 300. theyre small
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _MACRO/Mobs/Effects/allulalo_brute_damage.rsi
        color: "#e5efff"
  - type: CanEscapeInventory
    baseResistTime: 1.0 #they break out of grabs FAST
  - type: TooShortForUI #short fucks
    blacklist:
      components:
      - TooShortForUiBlacklist
    whitelist:
      components:
      - TooShortForUiWhitelist
  - type: MeleeWeapon #bites you
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcAllulaloBite
    damage:
      types:
        Piercing: 4
  - type: SolutionManager
    solutions:
    - SolutionVenomAllulalo
  - type: MeleeChemicalInjector
    solution: melee
  - type: StaminaResistance
    damageCoefficient: 1.25 #takes the disabler/batong hits needed to stun from 4 > 3
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken #this was yesters idea, not mine
      amount: 5
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Monkey_burning
  - type: Tag
    tags:
    - VimPilot #fuck it, theyre small enough
    - DoorBumpOpener
    - AnomalyHost
    - CanPilot
    - FootstepSound
  - type: Speech
    speechSounds: Allulalo
    speechVerb: Allulalo
    allowedEmotes: ['Chitter', 'Hiss']
  - type: MovementSpeedModifier # They're so fast they go nyoom
    baseWalkSpeed: 3
    baseSprintSpeed: 5

- type: entity
  id: SolutionVenomAllulalo
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    id: melee
    solution:
      reagents:
      - ReagentId: Ethanotoxin
        Quantity: 4 #you can bite someone four times. upped from two based on feedback
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Ethanotoxin
        Quantity: 0.05 #20 second cooldown between bites working full power

- type: entity
  parent: OrganBase
  id: OrganAllulalo
  abstract: true
  suffix: Allulalo

- type: entity
  id: OrganAllulaloMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Allulalo ]
    updateIntervalMultiplier: 1.5 # This should make them metabolize things twice as fast. I think. This new system is scary.

